<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — SmarTravel</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          145deg,
          #1b4332 0%,
          #2d6a4f 50%,
          #1b4332 100%
        );
        color: #fff;
        overflow: hidden;
        position: relative;
      }

      /* Animated background particles */
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            2px 2px at 20% 30%,
            rgba(52, 211, 153, 0.3),
            transparent
          ),
          radial-gradient(
            2px 2px at 60% 70%,
            rgba(52, 211, 153, 0.2),
            transparent
          ),
          radial-gradient(
            2px 2px at 80% 20%,
            rgba(52, 211, 153, 0.25),
            transparent
          ),
          radial-gradient(
            3px 3px at 40% 80%,
            rgba(52, 211, 153, 0.15),
            transparent
          ),
          radial-gradient(
            2px 2px at 10% 60%,
            rgba(52, 211, 153, 0.2),
            transparent
          );
        animation: drift 20s ease-in-out infinite;
      }

      @keyframes drift {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(1deg);
        }
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
        position: relative;
        z-index: 1;
      }

      .icon-wrap {
        width: 120px;
        height: 120px;
        margin: 0 auto 2rem;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .icon-wrap svg {
        width: 56px;
        height: 56px;
        opacity: 0.7;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }

      p {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 2rem;
        background: linear-gradient(135deg, #059669, #0d9488);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        box-shadow: 0 8px 30px rgba(5, 150, 105, 0.3);
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(5, 150, 105, 0.4);
      }

      .btn:active {
        transform: translateY(0);
      }

      .footer {
        margin-top: 3rem;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon-wrap">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="1" y1="1" x2="23" y2="23" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>

      <h1>You're offline</h1>
      <p>
        It looks like you've lost your internet connection. Check your network
        and try again to continue exploring with SmarTravel.
      </p>

      <button class="btn" onclick="window.location.reload()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
        Try Again
      </button>

      <div class="footer">SmarTravel — Nature-Powered Travel Intelligence</div>
    </div>
  </body>
</html>
