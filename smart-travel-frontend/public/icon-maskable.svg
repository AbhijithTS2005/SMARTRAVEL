<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Maskable icon: safe zone is center 80% (circle r=204.8). Key content within that. -->
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="mtree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background -->
  <rect width="512" height="512" fill="url(#mbg)"/>
  <!-- Tree centered in safe zone -->
  <polygon points="256,110 185,230 327,230" fill="url(#mtree)" opacity="0.9"/>
  <polygon points="256,170 168,300 344,300" fill="url(#mtree)" opacity="0.95"/>
  <polygon points="256,230 150,380 362,380" fill="url(#mtree)"/>
  <rect x="244" y="372" width="24" height="40" rx="3" fill="#795548"/>
</svg>
